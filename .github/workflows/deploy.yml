name: Deploy EU5 Mod Planner

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t eu5modplanner:ci .

      - name: Upload application source and deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.HOST_SSH_KEY }}
          port: ${{ secrets.HOST_PORT }}
          source: "Controllers,Models,Properties,Services,Views,wwwroot,appsettings.json,appsettings.Development.json,Eu5ModPlanner.csproj,Program.cs,NuGet.Config,Dockerfile,.dockerignore,docker-compose.yml,deploy,.env.example"
          strip_components: 0
          target: ${{ vars.DEPLOY_PATH }}/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.HOST_SSH_KEY }}
          port: ${{ secrets.HOST_PORT }}
          script: |
            set -e
            mkdir -p "${{ vars.DEPLOY_PATH }}"
            cd "${{ vars.DEPLOY_PATH }}"

            if [ ! -f .env ]; then
              cp deploy/.env.vps.example .env
            fi

            docker compose down || true
            docker compose up -d --build
            docker compose ps
