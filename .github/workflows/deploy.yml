name: Deploy EU5 Mod Planner

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t eu5modplanner:ci .

      - name: Upload application source and deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.HOST_SSH_KEY }}
          port: ${{ secrets.HOST_PORT }}
          source: "Controllers,Models,Properties,Services,Views,wwwroot,appsettings.json,appsettings.Development.json,Eu5ModPlanner.csproj,Program.cs,NuGet.Config,Dockerfile,.dockerignore,docker-compose.yml,deploy,.env.example"
          strip_components: 0
          target: ${{ vars.DEPLOY_PATH }}/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.10
        env:
          APP_PORT: ${{ vars.APP_PORT }}
          ASPNETCORE_ENVIRONMENT: ${{ vars.ASPNETCORE_ENVIRONMENT }}
          ADMIN_AUTH_USERNAME: ${{ vars.ADMIN_AUTH_USERNAME }}
          ADMIN_AUTH_PASSWORD: ${{ secrets.ADMIN_AUTH_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.HOST_SSH_KEY }}
          port: ${{ secrets.HOST_PORT }}
          envs: APP_PORT,ASPNETCORE_ENVIRONMENT,ADMIN_AUTH_USERNAME,ADMIN_AUTH_PASSWORD,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_PORT
          script: |
            set -e
            mkdir -p "${{ vars.DEPLOY_PATH }}"
            cd "${{ vars.DEPLOY_PATH }}"

            cat > .env <<EOF
            APP_PORT=${APP_PORT:-5068}
            ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
            ADMIN_AUTH_USERNAME=${ADMIN_AUTH_USERNAME:-admin}
            ADMIN_AUTH_PASSWORD=${ADMIN_AUTH_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB:-eu5_mod_planner}
            POSTGRES_USER=${POSTGRES_USER:-eu5planner}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_PORT=${POSTGRES_PORT:-54329}
            EOF

            docker compose down || true
            docker compose up -d --build
            docker compose ps
