services:
  postgres:
    image: postgres:16-alpine
    container_name: eu5-mod-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eu5_mod_planner_dev}
      POSTGRES_USER: ${POSTGRES_USER:-eu5planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eu5planner}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eu5planner} -d ${POSTGRES_DB:-eu5_mod_planner_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
